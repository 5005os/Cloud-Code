<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AkylAi — умный чат</title>
  <meta name="description" content="AkylAi — умный чат-ассистент. Спросите что угодно." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .chat-page { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; padding: 30px 16px; }
    .chat-page .chat-card { width: 100%; }
  </style>
</head>
<body>

  <!-- ШАПКА -->
  <header class="site-header">
    <div class="container nav">
      <a href="#" class="logo">
        <span class="logo-mark">🧠</span>
        <span class="logo-text">Akyl<span class="grad">Ai</span></span>
      </a>
    </div>
  </header>

  <!-- ЧАТ -->
  <main class="chat-page">
    <div class="chat-card">
      <div class="chat-window" id="chatWindow">
        <div class="msg bot">
          <div class="avatar">AI</div>
          <div class="bubble">
            Салам! 👋 Мен AkylAi — кыргызча сүйлөгөн жардамчы.
            Чем могу помочь? Спрашивайте на кыргызском или русском.
          </div>
        </div>
      </div>

      <form class="chat-input" id="chatForm">
        <input type="text" id="chatText" placeholder="Напишите сообщение…" autocomplete="off" />
        <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
    </div>
  </main>

  <script src="data/knowledge.js"></script>
  <script src="data/laws.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
