<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AkylAi — умный чат</title>
  <meta name="description" content="AkylAi — умный чат-ассистент. Спросите что угодно." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .chat-page { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; padding: 30px 16px; }
    .chat-page .chat-card { width: 100%; }
    .model-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 14px; flex-wrap: wrap; }
    .model-bar label { color: #666; }
    .model-bar select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ccc; font: inherit; background: #fff; cursor: pointer; }
    .model-bar .hint { color: #999; font-size: 12px; }
  </style>
</head>
<body>

  <!-- ШАПКА -->
  <header class="site-header">
    <div class="container nav">
      <a href="#" class="logo">
        <span class="logo-mark">🧠</span>
        <span class="logo-text">Akyl<span class="grad">Ai</span></span>
      </a>
    </div>
  </header>

  <!-- ЧАТ -->
  <main class="chat-page">
    <div class="chat-card">
      <div class="model-bar">
        <label for="modelSelect">🧠 Модель:</label>
        <select id="modelSelect">
          <option value="qwen-coder">Qwen 🇨🇳</option>
          <option value="openai">GPT (ChatGPT) 🇺🇸</option>
          <option value="deepseek">DeepSeek 🇨🇳</option>
          <option value="mistral">Mistral 🇫🇷</option>
          <option value="llama">Llama (Meta) 🇺🇸</option>
          <option value="gemini">Gemini (Google) 🇺🇸</option>
        </select>
        <span class="hint">законы КР — всегда из базы</span>
      </div>
      <div class="chat-window" id="chatWindow">
        <div class="msg bot">
          <div class="avatar">AI</div>
          <div class="bubble">
            Салам! 👋 Мен AkylAi — кыргызча сүйлөгөн жардамчы.
            Чем могу помочь? Спрашивайте на кыргызском или русском.
          </div>
        </div>
      </div>

      <form class="chat-input" id="chatForm">
        <input type="text" id="chatText" placeholder="Напишите сообщение…" autocomplete="off" />
        <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
    </div>
  </main>

  <script src="data/knowledge.js"></script>
  <script src="data/laws.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
