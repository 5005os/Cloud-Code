<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Kyrgyzstan — умный чат</title>
  <meta name="description" content="Умный ИИ-чат: спросите что угодно, получите ответ и код на Swift, SwiftUI, UIKit, HTML, Python и других языках." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- подсветка кода -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

  <!-- ШАПКА -->
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">AI</span>
      <span class="brand-name">Kyrgyzstan</span>
    </div>
    <div class="header-actions">
      <button id="newChat" class="hbtn" title="Новый чат">＋ Новый чат</button>
      <button id="openSettings" class="hbtn" title="Настройки">⚙️</button>
    </div>
  </header>

  <!-- ОКНО ЧАТА -->
  <main class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">🤖🇰🇬</div>
      <h1>Чем могу помочь?</h1>
      <p>Спросите что угодно или попросите написать код — Swift, SwiftUI, UIKit, HTML, Python и другое.</p>
      <div class="chips">
        <button>Напиши экран входа на SwiftUI</button>
        <button>HTML-страница с формой обратной связи</button>
        <button>Скрипт на Python для парсинга сайта</button>
        <button>Кнопка на UIKit с анимацией</button>
        <button>Объясни, что такое async/await</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
  </main>

  <!-- ПОЛЕ ВВОДА -->
  <footer class="composer">
    <form id="form" class="composer-inner">
      <textarea id="input" rows="1" placeholder="Напишите сообщение… (Enter — отправить, Shift+Enter — новая строка)"></textarea>
      <button type="submit" id="send" class="send-btn" title="Отправить">➤</button>
    </form>
    <div class="composer-hint" id="hint">⚠️ Включите бесплатный режим в ⚙️, чтобы ИИ отвечал на вопросы и писал код.</div>
  </footer>

  <!-- МОДАЛКА НАСТРОЕК -->
  <div class="modal-overlay" id="settingsModal" hidden>
    <div class="modal">
      <h2>⚙️ Настройки</h2>
      <p>Выберите ИИ и вставьте API-ключ. Ключ хранится <strong>только в вашем браузере</strong>.</p>

      <label>Режим ИИ</label>
      <select id="providerSelect">
        <option value="gemini">🟢 Бесплатный режим</option>
        <option value="claude">🔴 Премиум режим (платный)</option>
      </select>

      <label>API-ключ</label>
      <input type="password" id="apiKey" placeholder="вставьте ключ сюда" />
      <p class="get-key" id="getKeyLink"></p>

      <div class="modal-actions">
        <button id="saveSettings" class="btn-primary">Сохранить</button>
        <button id="closeSettings" class="btn-ghost">Закрыть</button>
      </div>
      <p class="modal-status" id="modalStatus"></p>
    </div>
  </div>

  <!-- Markdown + подсветка кода -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
